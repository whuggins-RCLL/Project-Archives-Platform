name: CI Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guard-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Persistent-state guard
        run: npm run ci:guard

      - name: Firestore rules / client sync guard
        run: npm run ci:rules-sync

      - name: Build
        run: npm run build
