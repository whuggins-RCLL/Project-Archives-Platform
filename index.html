<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Archives</title>
    <meta
      name="description"
      content="Project Archives is a workspace for organizing, tracking, and reviewing projects in one place."
    />
    <meta name="theme-color" content="#ffffff" />
    <script>
      // Apply the saved (or OS-preferred) theme before first paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem('theme-preference');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved =
            stored === 'light' || stored === 'dark'
              ? stored
              : prefersDark
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0c0f12' : '#ffffff');
        } catch (e) {}
      })();
    </script>
    <meta property="og:title" content="Project Archives" />
    <meta
      property="og:description"
      content="Organize, track, and review project records from a single dashboard."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="/" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f172a'/%3E%3Cpath d='M18 18h28v6H24v7h20v6H24v9h22v6H18V18z' fill='%23ffffff'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <noscript>
      This app requires JavaScript to run. Please enable JavaScript in your browser settings.
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
